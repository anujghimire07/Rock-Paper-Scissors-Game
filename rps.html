<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="rps.css">
</head>

<body>
    <h1 class="title">ROCK PAPER SCISSORS</h1>
    <div class="paracontainer">
        <div class="para1"></div>
        <div class="para2"></div>
    </div>
    <div class="conatiner">
        <div class="game">
            <button class="box rock">ROCK</button>
            <button class="box paper">PAPER</button>
            <button class="box scissors">SCISSORS</button>
        </div>
    </div>
    <div class="score">
        <div class="player"></div>
        <div class="draw"></div>
        <div class="computer"></div>
    </div>
    <div class="resetbox">
        <button class="reset">RESET</button>
    </div>
</body>
<script src="rps.js"></script>

</html>
